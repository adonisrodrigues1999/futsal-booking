name: Deploy to Azure

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  AZURE_WEBAPP_NAME: footbook-de4f92
  AZURE_RESOURCE_GROUP: rg-footbook-cheap

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure test scripts are executable
        run: chmod +x scripts/test_unit.sh scripts/test_fraud.sh scripts/test_e2e_build.sh

      - name: Fraud detection tests
        run: ./scripts/test_fraud.sh

      - name: Unit test suite
        run: ./scripts/test_unit.sh

      - name: End-to-end build checks
        run: ./scripts/test_e2e_build.sh

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Configure app settings
        env:
          RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
          RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET }}
          RAZORPAY_WEBHOOK_SECRET: ${{ secrets.RAZORPAY_WEBHOOK_SECRET }}
        run: |
          settings=(
            ALLOWED_HOSTS="$AZURE_WEBAPP_NAME.azurewebsites.net,.azurewebsites.net,footbook.online,www.footbook.online"
            CSRF_TRUSTED_ORIGINS="https://$AZURE_WEBAPP_NAME.azurewebsites.net,https://*.azurewebsites.net,https://footbook.online,https://www.footbook.online"
            EMAIL_HOST=smtp.gmail.com
            EMAIL_PORT=587
            EMAIL_USE_TLS=True
            EMAIL_HOST_USER=foo.book.online.india@gmail.com
            DEFAULT_FROM_EMAIL=foo.book.online.india@gmail.com
          )

          if [ -n "${RAZORPAY_KEY_ID:-}" ]; then settings+=("RAZORPAY_KEY_ID=$RAZORPAY_KEY_ID"); fi
          if [ -n "${RAZORPAY_KEY_SECRET:-}" ]; then settings+=("RAZORPAY_KEY_SECRET=$RAZORPAY_KEY_SECRET"); fi
          if [ -n "${RAZORPAY_WEBHOOK_SECRET:-}" ]; then settings+=("RAZORPAY_WEBHOOK_SECRET=$RAZORPAY_WEBHOOK_SECRET"); fi

          az webapp config appsettings set \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_WEBAPP_NAME" \
            --settings "${settings[@]}"

      - name: Configure startup command
        run: |
          az webapp config set \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_WEBAPP_NAME" \
            --startup-file "python -m config.startup"

      - name: Build clean deployment package
        run: |
          rm -rf /tmp/futsal-booking-deploy
          mkdir -p /tmp/futsal-booking-deploy
          git archive --format=tar HEAD | tar -x -C /tmp/futsal-booking-deploy
          find /tmp/futsal-booking-deploy -type d -name '__pycache__' -prune -exec rm -rf {} +
          find /tmp/futsal-booking-deploy -type f -name '*.pyc' -delete
          rm -rf \
            /tmp/futsal-booking-deploy/staticfiles \
            /tmp/futsal-booking-deploy/db.sqlite3 \
            /tmp/futsal-booking-deploy/.azure \
            /tmp/futsal-booking-deploy/.env \
            /tmp/futsal-booking-deploy/venv \
            /tmp/futsal-booking-deploy/to\ implement
          cd /tmp/futsal-booking-deploy
          zip -qr "$GITHUB_WORKSPACE/app-deploy.zip" .

      - uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: app-deploy.zip
