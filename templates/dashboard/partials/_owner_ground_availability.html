<div class="card shadow-sm" id="owner-ground-availability">
  <div class="card-body">
    <div class="d-flex align-items-center justify-content-between mb-3">
      <h5 class="mb-0">Ground Availability</h5>
      <span class="small text-muted">Pause or resume bookings per ground</span>
    </div>
    <div class="row g-3">
      {% for ground in owner_ground_objects %}
        <div class="col-md-6 col-lg-4">
          <div class="border rounded p-3 h-100 d-flex flex-column justify-content-between">
            <div>
              <div class="fw-semibold">{{ ground.name }}</div>
              <div class="small text-muted">{{ ground.location }}</div>
              {% if ground.is_active %}
                <span class="badge bg-success mt-2">Available</span>
              {% else %}
                <span class="badge bg-danger mt-2">Temporarily unavailable</span>
              {% endif %}
            </div>
            <form method="post" action="{% url 'toggle_ground_availability' ground.id %}" class="mt-3 ajax-form">
              {% csrf_token %}
              <input type="hidden" name="next" value="{% url 'owner_dashboard' %}">
              <button type="submit" class="btn btn-sm {% if ground.is_active %}btn-outline-danger{% else %}btn-outline-success{% endif %}">
                {% if ground.is_active %}Make Unavailable{% else %}Make Available{% endif %}
              </button>
            </form>
          </div>
        </div>
      {% empty %}
        <div class="col-12 text-muted">No grounds available.</div>
      {% endfor %}
    </div>
  </div>
</div>
