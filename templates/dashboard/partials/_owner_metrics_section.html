<div class="row g-3 mb-4" id="owner-core-metrics">
  <div class="col-sm-6 col-md-4">
    <div class="card p-3 shadow-sm metric-card h-100">
      <div class="d-flex align-items-center justify-content-between">
        <div>
          <div class="small text-muted">Total bookings</div>
          <div class="h3 mb-0" data-count>{{ stats.total_bookings }}</div>
        </div>
        <div class="ms-3 metric-icon">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="5" width="18" height="16" rx="2" stroke="#15803d" stroke-width="1.5"/>
            <path d="M16 3v4M8 3v4" stroke="#15803d" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
      </div>
    </div>
  </div>

  <div class="col-sm-6 col-md-4">
    <div class="card p-3 shadow-sm metric-card h-100">
      <div class="d-flex align-items-center justify-content-between">
        <div>
          <div class="small text-muted">Owner Revenue</div>
          <div class="h3 mb-0" data-count>₹{{ stats.revenue }}</div>
        </div>
        <div class="ms-3 metric-icon">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
            <rect x="2" y="7" width="20" height="10" rx="2" stroke="#15803d" stroke-width="1.5"/>
            <circle cx="12" cy="12" r="2.2" stroke="#f59e0b" stroke-width="1.5"/>
          </svg>
        </div>
      </div>
    </div>
  </div>

  <div class="col-sm-6 col-md-4">
    <div class="card p-3 shadow-sm metric-card h-100">
      <div class="d-flex align-items-center justify-content-between">
        <div>
          <div class="small text-muted">Active grounds</div>
          <div class="h3 mb-0">{{ stats.active_grounds }}</div>
        </div>
        <div class="ms-3 metric-icon">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 17h3v-7" stroke="#15803d" stroke-width="1.6" stroke-linecap="round"/>
            <path d="M10 17h3v-4" stroke="#15803d" stroke-width="1.6" stroke-linecap="round"/>
            <path d="M17 17h3v-10" stroke="#15803d" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </div>
      </div>
    </div>
  </div>
</div>
